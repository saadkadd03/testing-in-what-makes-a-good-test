<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>What Makes a Good Test?</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    margin: 0;
}

.container {
    max-width: 800px;
    margin: 30px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 { text-align: center; font-size: 36px; }

input[type="text"] {
    width: 100%;
    padding: 10px;
    margin-bottom: 20px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.question {
    background: #f7f9fc;
    padding: 15px;
    margin-bottom: 15px;
    border-left: 5px solid #4facfe;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    background: #4facfe;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover { background: #007bff; }

.result {
    text-align: center;
    margin-top: 20px;
    font-size: 20px;
}

.scoreboard {
    margin-top: 30px;
    background: #eef6ff;
    padding: 15px;
    border-radius: 10px;
}

.scoreboard h2 {
    text-align: center;
}

.scoreboard ul {
    list-style: none;
    padding: 0;
}

.scoreboard li {
    padding: 5px;
    border-bottom: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">

<h1>What Makes a Good Test?</h1>

<input type="text" id="studentName" placeholder="Enter your full name">

<form id="quizForm">

<div class="question">
<p>1. Validity refers to:</p>
<label><input type="radio" name="q1" value="1"> Measuring what the test measures</label><br>
<label><input type="radio" name="q1" value="0"> Ease of correction</label>
</div>

<div class="question">
<p>2. Reliable test means:</p>
<label><input type="radio" name="q2" value="1"> Consistent results</label><br>
<label><input type="radio" name="q2" value="0"> Easy to grade</label>
</div>

<div class="question">
<p>3. Practical test for large classes:</p>
<label><input type="radio" name="q3" value="1"> Multiple-choice</label><br>
<label><input type="radio" name="q3" value="0"> Oral exam</label>
</div>

<div class="question">
<p>4. Objectivity means:</p>
<label><input type="radio" name="q4" value="1"> No bias</label><br>
<label><input type="radio" name="q4" value="0"> Real-life tasks</label>
</div>

<div class="question">
<p>5. Tests influence learning:</p>
<label><input type="radio" name="q5" value="1"> True</label><br>
<label><input type="radio" name="q5" value="0"> False</label>
</div>

<button type="button" onclick="submitTest()">Submit</button>

</form>

<div class="result" id="result"></div>

<div class="scoreboard">
<h2>📊 Scoreboard</h2>
<ul id="scoreList"></ul>
</div>

</div>

<script>
function submitTest() {
    let name = document.getElementById("studentName").value.trim();
    if (name === "") {
        alert("Please enter your full name!");
        return;
    }

    let score = 0;
    let total = 5;

    for (let i = 1; i <= total; i++) {
        let q = document.querySelector('input[name="q'+i+'"]:checked');
        if (q) score += parseInt(q.value);
    }

    document.getElementById("result").innerHTML =
        "Score: " + score + "/" + total;

    // Save results
    let results = JSON.parse(localStorage.getItem("scores")) || [];
    results.push({name: name, score: score});
    localStorage.setItem("scores", JSON.stringify(results));

    displayScores();
}

function displayScores() {
    let results = JSON.parse(localStorage.getItem("scores")) || [];
    let list = document.getElementById("scoreList");
    list.innerHTML = "";

    results.forEach(r => {
        let li = document.createElement("li");
        li.textContent = r.name + " — " + r.score;
        list.appendChild(li);
    });
}

displayScores();
</script>

</body>
</html>
